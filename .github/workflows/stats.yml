name: Update Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: node scripts/generate-stats.js

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add svgs/stats.svg
          git commit -m "update stats" || echo "no changes"
          git push
