<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="tl-stats" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#6ee600" stop-opacity="0" />
            <stop offset="50%" stop-color="#6ee600" stop-opacity="1" />
            <stop offset="100%" stop-color="#6ee600" stop-opacity="0" />
        </linearGradient>
        <pattern id="g-stats" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M40 0L0 0 0 40" fill="none" stroke="#6ee600" stroke-width="0.3" opacity="0.07" />
        </pattern>
    </defs>

    <!-- Background -->
    <rect width="860" height="200" rx="12" fill="#0d0d0d" />
    <rect width="860" height="200" rx="12" fill="url(#g-stats)" />
    <rect width="860" height="2" rx="1" fill="url(#tl-stats)" />
    <rect width="860" height="200" rx="12" fill="none" stroke="#1a3a00" stroke-width="1" />

    <!-- Corner brackets -->
    <path d="M16 40L16 16L40 16" fill="none" stroke="#2a5000" stroke-width="1.5" />
    <path d="M820 16L844 16L844 40" fill="none" stroke="#2a5000" stroke-width="1.5" />
    <path d="M16 184L16 160" fill="none" stroke="#2a5000" stroke-width="1.5" />
    <path d="M844 184L844 160" fill="none" stroke="#2a5000" stroke-width="1.5" />

    <!-- Title -->
    <text x="32" y="44" font-family="monospace" font-size="11" fill="#6ee600" letter-spacing="3" font-weight="bold">▶ ~/STATS</text>
    <rect x="32" y="50" width="796" height="1" fill="#1a3a00" />

    <!-- Stats Grid -->
    <g id="stats-content">
        <!-- Left Column -->
        <text x="60" y="85" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">TOTAL_CONTRIBUTIONS</text>
        <text x="60" y="105" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">109</text>

        <text x="60" y="135" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">REPOS_CREATED</text>
        <text x="60" y="155" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">7</text>

        <!-- Middle Column -->
        <text x="300" y="85" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">CURRENT_STREAK</text>
        <text x="300" y="105" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">2 days</text>

        <text x="300" y="135" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">COMMITS_THIS_YEAR</text>
        <text x="300" y="155" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">52</text>

        <!-- Right Column -->
        <text x="540" y="85" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">LONGEST_STREAK</text>
        <text x="540" y="105" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">5 days</text>

        <text x="540" y="135" font-family="monospace" font-size="9" fill="#3d8000" letter-spacing="1">PULL_REQUESTS</text>
        <text x="540" y="155" font-family="monospace" font-size="20" fill="#6ee600" font-weight="bold">8</text>
    </g>

    <!-- Terminal cursor -->
    <rect x="750" y="170" width="12" height="18" fill="#6ee600" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite" />
    </rect>
</svg>
