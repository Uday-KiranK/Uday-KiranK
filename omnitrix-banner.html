<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omnitrix Banner – Uday-KiranK</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .banner {
    width: 860px;
    height: 280px;
    background: #0d0d0d;
    border: 1.5px solid #1e1e1e;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 40px;
    padding: 0 48px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid background */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(110,230,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110,230,0,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    border-radius: 16px;
    pointer-events: none;
  }

  /* Glow corner accent */
  .banner::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(110,230,0,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── WATCH ── */
  .watch-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }

  .outer-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      #181818 0deg, #252525 20deg, #111 50deg,
      #2a2a2a 80deg, #151515 110deg, #222 140deg,
      #111 170deg, #2a2a2a 200deg, #181818 230deg,
      #252525 260deg, #111 290deg, #1e1e1e 320deg,
      #181818 360deg
    );
    border: 2px solid #111;
    animation: spinRing 8s linear infinite;
  }

  .dots-layer {
    position: absolute; inset: 0;
    border-radius: 50%;
    animation: spinRing 8s linear infinite;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .dot {
    position: absolute;
    width: 14px; height: 14px;
    background: radial-gradient(circle at 35% 30%, #ccff66, #3d8000);
    border-radius: 50%;
    border: 1.5px solid #1a1a1a;
    box-shadow: 0 0 8px #6ee600, 0 0 2px #aaff00;
  }
  .dot-t { top: 6px;    left: 50%; transform: translateX(-50%); }
  .dot-r { right: 6px;  top: 50%;  transform: translateY(-50%); }
  .dot-b { bottom: 6px; left: 50%; transform: translateX(-50%); }
  .dot-l { left: 6px;   top: 50%;  transform: translateY(-50%); }

  .mid-ring {
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: #0e0e0e;
    border: 3px solid #161616;
  }

  .face {
    position: absolute;
    inset: 28px;
    border-radius: 50%;
    background: #141414;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .diamond {
    width: 88px; height: 88px;
    background: #6ee600;
    transform: rotate(45deg);
    border: 2px solid #3a7a00;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
    animation: diamondPulse 3s ease-in-out infinite;
  }

  @keyframes diamondPulse {
    0%,100% { box-shadow: inset 0 0 12px rgba(0,0,0,0.3), 0 0 0 rgba(110,230,0,0); }
    50%      { box-shadow: inset 0 0 12px rgba(0,0,0,0.2), 0 0 18px rgba(110,230,0,0.35); }
  }

  .icon-wrap {
    position: absolute;
    width: 54px; height: 54px;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg {
    width: 44px; height: 44px;
    fill: #000;
    stroke: none;
    transition: opacity 0.3s;
  }

  @keyframes iconPop {
    0%   { transform: rotate(-45deg) scale(0.6); opacity: 0; }
    60%  { transform: rotate(-45deg) scale(1.1); opacity: 1; }
    100% { transform: rotate(-45deg) scale(1);   opacity: 1; }
  }

  .icon-wrap.pop { animation: iconPop 0.4s ease both; }

  /* ── TEXT SIDE ── */
  .text-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pulse-dot {
    width: 7px; height: 7px;
    background: #6ee600;
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
    box-shadow: 0 0 6px #6ee600;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  .status-text {
    font-size: 11px;
    color: #6ee600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #f0f0f0;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .name span { color: #6ee600; }

  .tagline {
    font-size: 15px;
    color: #6ee600;
    letter-spacing: 0.06em;
    min-height: 22px;
    position: relative;
    overflow: hidden;
  }

  .tagline-inner {
    display: inline-block;
    animation: slideUp 0.4s ease both;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  @keyframes slideOut {
    from { transform: translateY(0);     opacity: 1; }
    to   { transform: translateY(-100%); opacity: 0; }
  }

  .terminal-line {
    font-size: 11px;
    color: #3d5c00;
    letter-spacing: 0.08em;
    min-height: 16px;
  }

  .terminal-line .cmd { color: #6ee600; }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a4400, transparent);
    margin: 2px 0;
  }

  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    color: #6ee600;
    border: 1px solid #2a4400;
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 0.08em;
    background: rgba(110,230,0,0.05);
  }

  /* scan line effect */
  .scanline {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.07) 3px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
  }

  /* README usage box */
  .readme-box {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0d0d0d;
    border-top: 1px solid #1e1e1e;
    padding: 14px 32px;
    font-size: 12px;
    color: #3d5c00;
    font-family: 'Share Tech Mono', monospace;
  }
  .readme-box .hl { color: #6ee600; }
</style>
</head>
<body>

<div class="banner">
  <div class="scanline"></div>

  <!-- WATCH -->
  <div class="watch-wrap">
    <div class="outer-ring"></div>
    <div class="dots-layer">
      <div class="dot dot-t"></div>
      <div class="dot dot-r"></div>
      <div class="dot dot-b"></div>
      <div class="dot dot-l"></div>
    </div>
    <div class="mid-ring"></div>
    <div class="face">
      <div class="diamond">
        <div class="icon-wrap" id="icon-wrap">
          <!-- icon injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- TEXT -->
  <div class="text-side">
    <div class="status-row">
      <div class="pulse-dot"></div>
      <span class="status-text" id="status">system online</span>
    </div>

    <div class="name">Uday<span>Kiran</span>K</div>

    <div class="tagline">
      <span class="tagline-inner" id="tagline">Full Stack Developer</span>
    </div>

    <div class="divider"></div>

    <div class="terminal-line" id="terminal">
      <span class="cmd">&gt;</span> loading modules...
    </div>

    <div class="badges">
      <div class="badge">full stack</div>
      <div class="badge">cybersecurity</div>
      <div class="badge">gamer</div>
    </div>
  </div>
</div>

<div class="readme-box">
  <span class="hl">&gt; README embed:</span>
  &nbsp;&lt;img src="<span class="hl">https://raw.githubusercontent.com/Uday-KiranK/Uday-KiranK/main/omnitrix-banner.html</span>" /&gt;
  &nbsp;|&nbsp; host on GitHub Pages or convert to GIF with <span class="hl">ScreenToGif</span>
</div>

<script>
const icons = {

  /* Full Stack — monitor with code lines inside */
  fullstack: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="#000">
    <rect x="4" y="6" width="40" height="28" rx="3"/>
    <rect x="18" y="34" width="12" height="4"/>
    <rect x="12" y="38" width="24" height="3" rx="1.5"/>
    <rect x="8"  y="11" width="10" height="2.5" rx="1.2" fill="#6ee600"/>
    <rect x="8"  y="16" width="16" height="2.5" rx="1.2" fill="#6ee600"/>
    <rect x="8"  y="21" width="12" height="2.5" rx="1.2" fill="#6ee600"/>
    <rect x="8"  y="26" width="8"  height="2.5" rx="1.2" fill="#6ee600"/>
    <path d="M28 24l4-5-4-5" fill="none" stroke="#6ee600" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 24l-4-5 4-5" fill="none" stroke="#6ee600" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`,

  /* Cybersecurity — shield with keyhole */
  cyber: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="#000">
    <path d="M24 4L6 12v12c0 10 7.6 19.3 18 22 10.4-2.7 18-12 18-22V12L24 4z"/>
    <circle cx="24" cy="22" r="4.5" fill="#6ee600"/>
    <rect x="21.5" y="24" width="5" height="7" rx="1.5" fill="#6ee600"/>
  </svg>`,

  /* Gamer — Nintendo Switch / PS style controller, very clean */
  gamer: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <!-- left grip -->
    <rect x="3" y="14" width="12" height="22" rx="6" fill="#000"/>
    <!-- right grip -->
    <rect x="33" y="14" width="12" height="22" rx="6" fill="#000"/>
    <!-- main body -->
    <rect x="10" y="16" width="28" height="18" rx="3" fill="#000"/>
    <!-- D-pad up -->
    <polygon points="16,20 18,18 20,20 20,23 16,23" fill="#6ee600"/>
    <!-- D-pad down -->
    <polygon points="16,27 18,29 20,27 20,24 16,24" fill="#6ee600"/>
    <!-- D-pad left -->
    <polygon points="13,22 15,20 15,27 13,25" fill="#6ee600"/>
    <!-- D-pad right -->
    <polygon points="23,20 21,20 21,27 23,27" fill="#6ee600"/>
    <!-- face buttons - circle arrangement -->
    <circle cx="34" cy="20" r="2.2" fill="#6ee600"/>
    <circle cx="39" cy="24" r="2.2" fill="#6ee600"/>
    <circle cx="34" cy="28" r="2.2" fill="#6ee600"/>
    <circle cx="29" cy="24" r="2.2" fill="#6ee600"/>
    <!-- analog sticks -->
    <circle cx="14" cy="30" r="3" fill="#333" stroke="#6ee600" stroke-width="1"/>
    <circle cx="32" cy="19" r="3" fill="#333" stroke="#6ee600" stroke-width="1"/>
    <!-- center logo hint -->
    <rect x="22" y="23" width="4" height="3" rx="1" fill="#333"/>
  </svg>`,

  /* Building · Breaking · Learning — rocket launching (progress, momentum, learning) */
  build: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <!-- rocket body -->
    <path d="M24 4 C24 4 34 12 34 26 L24 32 L14 26 C14 12 24 4 24 4Z" fill="#000"/>
    <!-- rocket nose highlight -->
    <path d="M24 4 C24 4 30 10 30 20 L24 24 L18 20 C18 10 24 4 24 4Z" fill="#6ee600"/>
    <!-- window -->
    <circle cx="24" cy="19" r="4" fill="#000"/>
    <circle cx="24" cy="19" r="2.5" fill="#6ee600" opacity="0.7"/>
    <!-- left fin -->
    <path d="M14 26 L8 34 L14 32 Z" fill="#000"/>
    <!-- right fin -->
    <path d="M34 26 L40 34 L34 32 Z" fill="#000"/>
    <!-- exhaust flames -->
    <path d="M20 32 Q24 44 28 32" fill="#6ee600" opacity="0.9"/>
    <path d="M21 32 Q24 40 27 32" fill="#000" opacity="0.5"/>
    <!-- stars -->
    <circle cx="8"  cy="10" r="1.2" fill="#6ee600"/>
    <circle cx="38" cy="8"  r="1"   fill="#6ee600"/>
    <circle cx="6"  cy="22" r="0.8" fill="#6ee600"/>
    <circle cx="41" cy="18" r="1.2" fill="#6ee600"/>
  </svg>`
};

const frames = [
  { tagline: "Full Stack Developer",           status: "system online",     terminal: "loading modules...",  spin: "8s",   icon: "fullstack" },
  { tagline: "Cybersecurity Enthusiast",       status: "scanning threats",  terminal: "firewall active",     spin: "4s",   icon: "cyber"     },
  { tagline: "Gamer at Heart",                 status: "player 1 ready",    terminal: "insert coin...",      spin: "2.5s", icon: "gamer"     },
  { tagline: "Building · Breaking · Learning", status: "in the zone",       terminal: "compiling ideas...",  spin: "6s",   icon: "build"     },
];

let idx = 0;
const tagEl    = document.getElementById("tagline");
const statusEl = document.getElementById("status");
const termEl   = document.getElementById("terminal");
const iconWrap = document.getElementById("icon-wrap");
const ring     = document.querySelector(".outer-ring");
const dots     = document.querySelector(".dots-layer");

function applyFrame(i) {
  const f = frames[i];
  tagEl.style.animation = "slideOut 0.35s ease both";

  setTimeout(() => {
    tagEl.textContent = f.tagline;
    tagEl.style.animation = "slideUp 0.35s ease both";
    statusEl.textContent  = f.status;
    termEl.innerHTML      = `<span class="cmd">&gt;</span> ${f.terminal}`;
    ring.style.animationDuration = f.spin;
    dots.style.animationDuration = f.spin;
    iconWrap.innerHTML = icons[f.icon];
    iconWrap.classList.remove("pop");
    void iconWrap.offsetWidth;
    iconWrap.classList.add("pop");
  }, 350);
}

applyFrame(0);
iconWrap.classList.add("pop");

setInterval(() => {
  idx = (idx + 1) % frames.length;
  applyFrame(idx);
}, 3200);
</script>
</body>
</html>
